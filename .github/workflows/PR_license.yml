# This workflow uses `pull_request_target` which has access to a WLS license. For security reasons, this workflow
# gates access to secrets behind a GitHub environment called "safe-to-test". That environment must be configured
# in the repository Settings → Environments with one or more required reviewers. When a PR is opened or updated,
# the workflow starts automatically but pauses at a dedicated approval gate job that declares
# `environment: safe-to-test` until a reviewer approves the run. Each new commit to the PR creates a
# fresh run that requires a new approval.
#
# Since a subset of checks already ran in the nolicense workflow, this workflow skips linting here.

name: build and test PR, license required

on:
  pull_request_target:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  approval_gate:
    runs-on: ubuntu-latest
    # This environment has required reviewers configured in Settings → Environments.
    # Using a single gate job keeps approvals/emails to one per workflow run.
    environment: safe-to-test
    timeout-minutes: 5
    steps:
      - run: echo "Approved to run licensed jobs"

  tests:
    needs: approval_gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        gurobi-version: ["gurobi11","gurobi12","gurobi13"]
        exclude:
          - python-version: "3.13"
            gurobi-version: "gurobi11"
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Setup Python
        uses: ./.github/actions/setup-python-and-install
        with:
          python-version: ${{ matrix.python-version }}
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
      - id: write-license
        name: Write license
        uses: ./.github/actions/write-license
        with:
          license: ${{ secrets.LICENSE }}
      - name: Test with tox (uv)
        env:
          GRB_LICENSE_FILE: ${{ steps.write-license.outputs.grb_license_file }}
          GUROBI_VERSION: ${{ matrix.gurobi-version }}
        run: |
          uvx tox

  examples:
    runs-on: ubuntu-latest
    needs: tests
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
        gurobi-version: ["gurobi11","gurobi12","gurobi13"]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Setup Python
        uses: ./.github/actions/setup-python-and-install
        with:
          python-version: ${{ matrix.python-version }}
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
      - id: write-license
        name: Write license
        uses: ./.github/actions/write-license
        with:
          license: ${{ secrets.LICENSE }}
      - name: Run examples (uv)
        env:
          GRB_LICENSE_FILE: ${{ steps.write-license.outputs.grb_license_file }}
          GUROBI_VERSION: ${{ matrix.gurobi-version }}
        run: |
          python_version_no_dot=$(echo "${{ matrix.python-version }}" | tr -d '.')
          uvx tox -e py${python_version_no_dot}-examples-${{ matrix.gurobi-version }}
