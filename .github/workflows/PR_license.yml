# This workflow runs after the "build and test PR, no license" workflow completes successfully.
# It has access to a WLS license. For security reasons, access to secrets is gated behind a
# GitHub environment called "safe-to-test" configured with one or more required reviewers.
# The approval is requested only once per run via a dedicated gate job, and only when the
# no-license checks have already passed.

name: build and test PR, license required

on:
  workflow_run:
    workflows: ["build and test PR, no license"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  approval_gate:
    # Only proceed when the triggering no-license workflow succeeded.
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    # This environment has required reviewers configured in Settings → Environments.
    # Using a single gate job keeps approvals/emails to one per workflow run.
    environment: safe-to-test
    timeout-minutes: 5
    steps:
      - run: echo "Approved to run licensed jobs"

  tests:
    needs: approval_gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        gurobi-version: ["gurobi11","gurobi12","gurobi13"]
        exclude:
          - python-version: "3.13"
            gurobi-version: "gurobi11"
    steps:
      # Check out the base branch first so that local reusable actions are
      # loaded from trusted code, not from the (potentially untrusted) PR branch.
      - uses: actions/checkout@v6
      - name: Setup Python
        uses: ./.github/actions/setup-python-and-install
        with:
          python-version: ${{ matrix.python-version }}
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
      - id: write-license
        name: Write license
        uses: ./.github/actions/write-license
        with:
          license: ${{ secrets.LICENSE }}
      # Now check out the PR code for test execution.
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Test with tox (uv)
        env:
          GRB_LICENSE_FILE: ${{ steps.write-license.outputs.grb_license_file }}
          GUROBI_VERSION: ${{ matrix.gurobi-version }}
        run: |
          uvx tox

  examples:
    runs-on: ubuntu-latest
    needs: tests
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
        gurobi-version: ["gurobi11","gurobi12","gurobi13"]
    steps:
      # Check out the base branch first so that local reusable actions are
      # loaded from trusted code, not from the (potentially untrusted) PR branch.
      - uses: actions/checkout@v6
      - name: Setup Python
        uses: ./.github/actions/setup-python-and-install
        with:
          python-version: ${{ matrix.python-version }}
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
      - id: write-license
        name: Write license
        uses: ./.github/actions/write-license
        with:
          license: ${{ secrets.LICENSE }}
      # Now check out the PR code for test execution.
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Run examples (uv)
        env:
          GRB_LICENSE_FILE: ${{ steps.write-license.outputs.grb_license_file }}
          GUROBI_VERSION: ${{ matrix.gurobi-version }}
        run: |
          python_version_no_dot=$(echo "${{ matrix.python-version }}" | tr -d '.')
          uvx tox -e py${python_version_no_dot}-examples-${{ matrix.gurobi-version }}
